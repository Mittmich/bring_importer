name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Cancel in-flight runs on the same ref when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Lint: ruff + black + isort
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff + black + isort)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x"
          enable-cache: true
          cache-dependency-glob: |
            backend/pyproject.toml
            backend/uv.lock
            backend/.python-version

      - name: Install backend (dev extras)
        working-directory: backend
        run: uv sync --extra dev

      - name: ruff check
        working-directory: backend
        run: uv run ruff check .

      - name: black --check
        working-directory: backend
        run: uv run black --check .

      - name: isort --check-only
        working-directory: backend
        run: uv run isort --check-only .

  # ---------------------------------------------------------------------------
  # Type-check: ty
  # ---------------------------------------------------------------------------
  typecheck:
    name: Type-check (ty)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x"
          enable-cache: true
          cache-dependency-glob: |
            backend/pyproject.toml
            backend/uv.lock
            backend/.python-version

      - name: Install backend (dev extras)
        working-directory: backend
        run: uv sync --extra dev

      - name: ty
        working-directory: backend
        run: uv run ty check .

  # ---------------------------------------------------------------------------
  # Test: pytest with coverage
  # ---------------------------------------------------------------------------
  test:
    name: Test (pytest + coverage)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x"
          enable-cache: true
          cache-dependency-glob: |
            backend/pyproject.toml
            backend/uv.lock
            backend/.python-version

      - name: Install backend (dev extras)
        working-directory: backend
        run: uv sync --extra dev

      - name: pytest
        working-directory: backend
        run: |
          uv run pytest \
            --cov=api \
            --cov=manage_users \
            --cov-fail-under=80 \
            --junitxml=pytest-junit.xml \
            -v

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-junit
          path: backend/pytest-junit.xml
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Frontend: type-check + build (React/Vite)
  # ---------------------------------------------------------------------------
  frontend-build:
    name: Frontend build (React + Vite)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json

      - name: Install npm deps
        working-directory: frontend-react
        run: npm ci

      - name: Type-check + build
        working-directory: frontend-react
        run: npm run build

  # ---------------------------------------------------------------------------
  # Docker build: validate backend/Dockerfile builds cleanly
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker build (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
