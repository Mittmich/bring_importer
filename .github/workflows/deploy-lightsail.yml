# Deploy to AWS Lightsail.
#
# Triggered ONLY after the `CI` workflow completes successfully on `main`.
# This is enforced by the `workflow_run` event below — the previous trigger
# model (push to main / merged PR) is intentionally removed so that no
# commit can reach the server without first passing CI.
#
# Branch-protection note: GitHub branch-protection rules on `main` should
# also require the `CI / test` (and friends) check to pass before merge.
# This is a repository settings change, not a workflow change — set it at
# https://github.com/<owner>/<repo>/settings/branches.

name: Deploy to AWS Lightsail

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    # Only deploy if the upstream CI run succeeded.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LIGHTSAIL_SSH_KEY }}

      - name: Add Lightsail host to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.LIGHTSAIL_HOST }} >> ~/.ssh/known_hosts

      - name: Ensure uv is installed on the Lightsail box
        # uv isn't a system package on most stock images. The official
        # installer is idempotent: it skips re-installing if uv is
        # already on PATH. Installs into ~/.local/bin/uv.
        run: |
          ssh ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} '
            if ! command -v uv >/dev/null 2>&1 && [ ! -x "$HOME/.local/bin/uv" ]; then
              echo "Installing uv..."
              curl -LsSf https://astral.sh/uv/install.sh | sh
            else
              echo "uv already present"
            fi
          '

      - name: Stop existing app on Lightsail
        run: |
          ssh ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} 'cd ${{ secrets.LIGHTSAIL_APP_PATH }} && sudo ./stop.sh || true'

      - name: Deploy new code to Lightsail
        run: |
          ssh ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} 'cd ${{ secrets.LIGHTSAIL_APP_PATH }} && sudo git fetch origin && sudo git reset --hard origin/main'

      - name: Reset the venv to avoid stale-file permission errors
        # uv sync into an existing .venv can fail with "Permission denied"
        # on individual files (e.g. bcrypt's __pycache__) when the venv
        # was created by a different user (e.g. an earlier `sudo` run).
        # Wipe and re-create from scratch on every deploy — fast and
        # deterministic.
        run: |
          ssh ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} 'cd ${{ secrets.LIGHTSAIL_APP_PATH }}/backend && sudo rm -rf .venv'

      - name: Install Python dependencies
        # Uses the just-installed uv. `uv sync` (no --extra dev) installs
        # only runtime deps; the dev extras (pytest, ruff, etc.) are
        # not needed at runtime.
        run: |
          ssh ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} 'cd ${{ secrets.LIGHTSAIL_APP_PATH }}/backend && export PATH="$HOME/.local/bin:$PATH" && uv sync'

      - name: Start app on Lightsail
        run: |
          ssh ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} 'cd ${{ secrets.LIGHTSAIL_APP_PATH }} && sudo ./start.sh'

      - name: Print deployment success
        run: echo "Deployment to AWS Lightsail completed."
