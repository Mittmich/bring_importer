# Deploy to AWS Lightsail.
#
# Triggered ONLY after the `CI` workflow completes successfully on `main`.
# This is enforced by the `workflow_run` event below — no commit can reach
# the server without first passing CI (lint, typecheck, test, docker-build).
#
# One-time server setup (run manually on the Lightsail instance):
#   sudo apt-get update && sudo apt-get install -y docker.io docker-compose-plugin
#   sudo usermod -aG docker $USER   # then log out + back in

name: Deploy to AWS Lightsail

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    # Only deploy if the upstream CI run succeeded.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LIGHTSAIL_SSH_KEY }}

      - name: Add Lightsail host to known_hosts
        run: ssh-keyscan -H ${{ secrets.LIGHTSAIL_HOST }} >> ~/.ssh/known_hosts

      - name: Pull latest code
        run: |
          ssh ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} \
            'cd ${{ secrets.LIGHTSAIL_APP_PATH }} && git fetch origin && git reset --hard origin/main'

      - name: Deploy with docker compose
        run: |
          ssh ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} \
            'cd ${{ secrets.LIGHTSAIL_APP_PATH }} && docker compose up -d --build'

      - name: Print deployment success
        run: echo "Deployment to AWS Lightsail completed."
