<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Data</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <script type="application/ld+json" id="recipe-json"></script>
    <script src="env-config.js"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script async="async" src="https://platform.getbring.com/widgets/import.js"></script>
    <style>
      /* Additional styles for the recipe HTML content */
      #recipe-container {
        max-width: 800px;
        margin: 0 auto;
        padding: 32px 24px;
        background: #fff;
        border-radius: 0.5rem;
        box-shadow: 0 2px 16px rgba(0, 0, 0, 0.07);
      }

      #recipe-container h1,
      #recipe-container h2,
      [itemprop='name'] {
        font-size: 2.2rem;
        font-weight: 700;
        color: #2d3a4a;
        margin-bottom: 1rem;
      }

      #recipe-container h3,
      #recipe-container h4 {
        font-size: 1.25rem;
        color: #3b4a5a;
        margin-top: 1.5rem;
        margin-bottom: 0.5rem;
      }

      #recipe-container ul,
      #recipe-container ol {
        padding-left: 2rem;
      }

      #recipe-container li,
      [itemprop='recipeIngredient'] {
        margin-bottom: 0.5rem;
        font-size: 1.08rem;
      }

      #recipe-container .recipe-yield {
        color: #6c757d;
        margin-bottom: 1.2rem;
      }

      #recipe-container .recipe-description {
        background: #f8fafc;
        border-left: 4px solid #3498db;
        padding: 1rem 1.2rem;
        border-radius: 0.25rem;
        margin-bottom: 1.5rem;
      }

      #recipe-container img {
        max-width: 100%;
        height: auto;
        border-radius: 0.25rem;
        margin-bottom: 1.2rem;
      }

      /* Ensure all images are responsive */
      #recipe-container img {
        max-width: 100%;
        height: auto;
      }

      /* Style recipe elements */
      [itemprop='name'] {
        font-size: 2rem;
        margin-bottom: 1rem;
      }

      [itemprop='recipeIngredient'] {
        margin-bottom: 0.5rem;
      }

      [itemprop='recipeInstructions'] li {
        margin-bottom: 1rem;
      }

      /* Add more space between sections */
      #recipe-container > div {
        margin-bottom: 2rem;
      }
    </style>
  </head>
  <body>
    <div class="container mt-4 mb-4">
      <div class="d-flex justify-content-end gap-2 flex-wrap">
        <button id="add-to-bring-btn" class="btn btn-primary">Add to Bring</button>
        <a id="edit-btn" class="btn btn-outline-primary">Edit</a>
        <button id="delete-btn" class="btn btn-outline-danger">Delete</button>
        <div class="btn-group" role="group">
          <button id="view-source-btn" class="btn btn-sm btn-outline-secondary">
            View HTML Source
          </button>
          <a id="direct-html-link" class="btn btn-sm btn-outline-primary" target="_blank"
            >Open Raw HTML</a
          >
        </div>
      </div>
    </div>

    <!-- This page will be dynamically populated with recipe data -->
    <div id="recipe-container">
      <!-- If HTML content is available, it will be inserted here -->
    </div>

    <!-- Bring Import Card -->
    <div class="container mt-4 mb-4">
      <div id="bringImportCard" data-bring-import="" style="display: none; margin-top: 20px">
        <a href="https://www.getbring.com">Bring! Einkaufsliste App f&uuml;r iPhone und Android</a>
      </div>
    </div>

    <!-- Fallback container if no HTML content is available -->
    <div id="recipe-fallback" itemscope itemtype="http://schema.org/Recipe" style="display: none">
      <h1 itemprop="name" id="recipe-name">Recipe</h1>
      <div><span>Serves: </span><span itemprop="recipeYield" id="recipe-yield">4</span></div>
      <div id="description-container" style="display: none">
        <h3>Description:</h3>
        <p itemprop="description" id="recipe-description"></p>
      </div>
      <div>
        <h3>Ingredients:</h3>
        <ul id="ingredients-list">
          <!-- Ingredients will be added here dynamically -->
        </ul>
      </div>
    </div>

    <!-- Delete confirmation modal -->
    <div
      class="modal fade"
      id="deleteConfirmModal"
      tabindex="-1"
      aria-labelledby="deleteConfirmModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="deleteConfirmModalLabel">Delete recipe?</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <p>Delete <strong id="deleteTitle">this recipe</strong>? This cannot be undone.</p>
            <div id="deleteError" class="alert alert-danger d-none"></div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal for displaying HTML source -->
    <div
      class="modal fade"
      id="htmlSourceModal"
      tabindex="-1"
      aria-labelledby="htmlSourceModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="htmlSourceModalLabel">Recipe HTML Source</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <pre
              id="html-source-code"
              class="p-3 bg-light"
              style="overflow-x: auto"
            ><code></code></pre>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      (async function () {
        const token = localStorage.getItem('auth_token');
        if (!token) {
          window.location.href = 'login.html';
          return;
        }
        const urlParams = new URLSearchParams(window.location.search);
        const recipeUuid = urlParams.get('id');
        if (!recipeUuid) {
          document.getElementById('recipe-container').innerHTML =
            '<div class="alert alert-danger"><h4>No recipe ID provided</h4></div>';
          return;
        }

        const addToBringBtn = document.getElementById('add-to-bring-btn');
        const editBtn = document.getElementById('edit-btn');
        const deleteBtn = document.getElementById('delete-btn');
        const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');
        const deleteTitleEl = document.getElementById('deleteTitle');
        const deleteErrorEl = document.getElementById('deleteError');

        // Wire up static actions early so they're clickable even while
        // the recipe is still loading.
        editBtn.href = `edit-recipe.html?id=${recipeUuid}`;

        try {
          const response = await fetch(`${config.apiUrl}/recipes/${recipeUuid}.json`, {
            headers: { Authorization: `Bearer ${token}` },
          });
          if (response.status === 401) {
            localStorage.removeItem('auth_token');
            window.location.href = 'login.html';
            return;
          }
          if (!response.ok) {
            throw new Error('Failed to load recipe data');
          }
          const recipeData = await response.json();
          document.getElementById('recipe-json').textContent = JSON.stringify(recipeData);
          document.getElementById('direct-html-link').href =
            `${config.apiUrl}/recipes/${recipeUuid}.html`;

          // Populate the page (HTML or fallback).
          if (recipeData.html_content) {
            document.getElementById('recipe-container').innerHTML = recipeData.html_content;
          } else {
            document.getElementById('recipe-fallback').style.display = 'block';
            document.getElementById('recipe-name').textContent = recipeData.name || 'Recipe';
            document.getElementById('recipe-yield').textContent =
              recipeData.recipeYield || '4 servings';
            if (recipeData.description) {
              document.getElementById('description-container').style.display = 'block';
              document.getElementById('recipe-description').textContent = recipeData.description;
            }
            const ingredientsList = document.getElementById('ingredients-list');
            ingredientsList.innerHTML = '';
            if (recipeData.recipeIngredient && recipeData.recipeIngredient.length) {
              recipeData.recipeIngredient.forEach((item) => {
                const li = document.createElement('li');
                li.setAttribute('itemprop', 'recipeIngredient');
                li.textContent = item;
                ingredientsList.appendChild(li);
              });
            }
          }

          // View-source button.
          const viewSourceBtn = document.getElementById('view-source-btn');
          if (recipeData.html_content) {
            viewSourceBtn.addEventListener('click', () => {
              document.querySelector('#html-source-code code').textContent =
                recipeData.html_content;
              new bootstrap.Modal(document.getElementById('htmlSourceModal')).show();
            });
          } else {
            viewSourceBtn.disabled = true;
            viewSourceBtn.textContent = 'No HTML Source Available';
          }

          // "Add to Bring" — scroll the existing card into view and re-invoke
          // the widget loader from utils.js.
          addToBringBtn.addEventListener('click', () => {
            const card = document.getElementById('bringImportCard');
            if (card) {
              card.style.display = 'block';
              card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
            if (typeof showBringWidget === 'function') showBringWidget(recipeUuid);
          });

          // Delete — open confirm modal, then DELETE.
          deleteBtn.addEventListener('click', () => {
            deleteTitleEl.textContent = recipeData.name || 'this recipe';
            deleteErrorEl.classList.add('d-none');
            new bootstrap.Modal(document.getElementById('deleteConfirmModal')).show();
          });
          confirmDeleteBtn.addEventListener('click', async () => {
            confirmDeleteBtn.disabled = true;
            confirmDeleteBtn.innerHTML =
              '<span class="spinner-border spinner-border-sm"></span> Deleting…';
            try {
              const r = await fetch(`${config.apiUrl}/recipes/${recipeUuid}`, {
                method: 'DELETE',
                headers: { Authorization: `Bearer ${token}` },
              });
              if (!r.ok) {
                const detail = (await r.json().catch(() => ({}))).detail || `HTTP ${r.status}`;
                throw new Error(detail);
              }
              window.location.href = 'index.html';
            } catch (err) {
              deleteErrorEl.textContent = err.message;
              deleteErrorEl.classList.remove('d-none');
              confirmDeleteBtn.disabled = false;
              confirmDeleteBtn.textContent = 'Delete';
            }
          });

          // Initialise the Bring import widget so the card is ready.
          if (typeof showBringWidget === 'function') showBringWidget(recipeUuid);
        } catch (error) {
          console.error('Error loading recipe:', error);
          document.getElementById('recipe-container').innerHTML = `
          <div class="alert alert-danger">
            <h4>Recipe not found</h4>
            <p>${error.message}</p>
            <a href="index.html" class="btn btn-primary">Return to Home</a>
          </div>`;
        }
      })();
    </script>
  </body>
</html>
