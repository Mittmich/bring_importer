<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Data</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script type="application/ld+json" id="recipe-json"></script>
  <script src="js/config.js"></script>
</head>
<body>
  <!-- This page will be dynamically populated with recipe data -->
  <div id="recipe-container" itemscope itemtype="http://schema.org/Recipe">
    <h1 itemprop="name" id="recipe-name">Recipe</h1>
    <div>
      <span>Serves: </span><span itemprop="recipeYield" id="recipe-yield">4</span>
    </div>
    <div id="description-container" style="display: none;">
      <h3>Description:</h3>
      <p itemprop="description" id="recipe-description"></p>
    </div>
    <div>
      <h3>Ingredients:</h3>
      <ul id="ingredients-list">
        <!-- Ingredients will be added here dynamically -->
      </ul>
    </div>
  </div>

  <script>
    // This script will fetch and populate the recipe data
    window.addEventListener('DOMContentLoaded', async () => {
      try {
        // Get recipe UUID from URL query parameters
        const urlParams = new URLSearchParams(window.location.search);
        const recipeUuid = urlParams.get('id');
        
        if (!recipeUuid) {
          throw new Error('No recipe ID provided');
        }
        
        // Fetch recipe data from the API
        const response = await fetch(`${config.apiUrl}/recipes/${recipeUuid}.json`);
        
        if (!response.ok) {
          throw new Error('Failed to load recipe data');
        }
        
        const recipeData = await response.json();
        
        // Add recipe JSON-LD data to the page
        document.getElementById('recipe-json').textContent = JSON.stringify(recipeData);
        
        // Populate the recipe details
        document.getElementById('recipe-name').textContent = recipeData.name || 'Recipe';
        document.getElementById('recipe-yield').textContent = recipeData.recipeYield || '4 servings';
        
        // Add description if available
        if (recipeData.description) {
          document.getElementById('description-container').style.display = 'block';
          document.getElementById('recipe-description').textContent = recipeData.description;
        }
        
        // Add ingredients
        const ingredientsList = document.getElementById('ingredients-list');
        ingredientsList.innerHTML = ''; // Clear existing items
        
        if (recipeData.recipeIngredient && recipeData.recipeIngredient.length) {
          recipeData.recipeIngredient.forEach(item => {
            const li = document.createElement('li');
            li.setAttribute('itemprop', 'recipeIngredient');
            li.textContent = item;
            ingredientsList.appendChild(li);
          });
        }
      } catch (error) {
        console.error('Error loading recipe:', error);
        document.getElementById('recipe-container').innerHTML = `
          <div class="alert alert-danger">
            <h4>Error loading recipe</h4>
            <p>${error.message}</p>
            <a href="index.html" class="btn btn-primary">Return to Home</a>
          </div>
        `;
      }
    });
  </script>
</body>
</html>
