<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Recipe</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#3498db" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="icon" href="images/icon-192.png" />
  </head>
  <body>
    <div class="container mt-4">
      <div class="card main-card">
        <div
          class="card-header bg-primary text-white d-flex justify-content-between align-items-center"
        >
          <h1 class="fs-4 mb-0">Edit Recipe</h1>
          <a href="javascript:history.back()" class="btn btn-sm btn-outline-light">Cancel</a>
        </div>
        <div class="card-body">
          <div id="loading" class="text-muted">Loading…</div>
          <form id="editForm" class="d-none">
            <input type="hidden" id="recipeUuid" />
            <input type="hidden" id="htmlContent" />

            <div class="mb-3">
              <label for="title" class="form-label">Title</label>
              <input type="text" class="form-control" id="title" required />
            </div>

            <div class="mb-3">
              <label for="recipeYield" class="form-label">Yield</label>
              <input type="text" class="form-control" id="recipeYield" placeholder="4 servings" />
            </div>

            <div class="mb-3">
              <label for="description" class="form-label">Description</label>
              <textarea class="form-control" id="description" rows="2"></textarea>
            </div>

            <div class="mb-3">
              <label for="ingredients" class="form-label">Ingredients (one per line)</label>
              <textarea class="form-control" id="ingredients" rows="8" required></textarea>
            </div>

            <div class="mb-3">
              <label for="note" class="form-label">Note (optional)</label>
              <textarea
                class="form-control"
                id="note"
                rows="2"
                placeholder="Any notes for yourself about this recipe…"
              ></textarea>
            </div>

            <div id="editError" class="alert alert-danger d-none"></div>

            <div class="d-flex gap-2">
              <a href="javascript:history.back()" class="btn btn-secondary">Cancel</a>
              <button type="submit" class="btn btn-primary" id="saveBtn">Save</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="env-config.js"></script>
    <script src="js/config.js"></script>
    <script src="js/edit-recipe.js"></script>
  </body>
</html>
