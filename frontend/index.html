<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe to Bring</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3498db">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="images/icon-192.png">
  <script async="async" src="https://platform.getbring.com/widgets/import.js"></script>
</head>
<body>
  <div class="sidebar">
    <button id="userBtn" class="btn btn-icon" aria-label="User">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-user"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    </button>
  </div>

  <div class="container mt-4">
    <div class="card main-card">
      <div class="card-header bg-primary text-white">
        <h1 class="fs-4 mb-0">Recipe to Bring Importer</h1>
      </div>
      <div class="card-body">
        <div class="mb-3">
          <label for="photo" class="form-label">Upload Recipe Photo:</label>
          <input type="file" class="form-control" id="photo" accept="image/*">
        </div>
        <button id="parseBtn" class="btn btn-primary">Parse Recipe</button>
        
        <div id="output" class="mt-4 p-3 border rounded d-none">
          <h5>Parsed Recipe</h5>
          <div id="recipe-html-container" class="mb-3"></div>
          <div class="d-flex gap-2 mb-3">
            <button id="viewJsonBtn" class="btn btn-sm btn-outline-secondary">Show JSON</button>
            <a id="viewFullRecipeBtn" class="btn btn-sm btn-outline-primary" target="_blank">View Full Recipe</a>
          </div>
          <pre id="outputJson" class="mb-0 d-none"></pre>
        </div>
        <div id="bringImportCard" data-bring-import="" style="display:none;margin-top: 10px;">
            <a href="https://www.getbring.com">Bring! Einkaufsliste App f&uuml;r iPhone und Android</a>
        </div>
      </div>
    </div>
  </div>

  <!-- User Modal -->
  <div class="modal fade" id="userModal" tabindex="-1" aria-labelledby="userModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="userModalLabel">Account</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p id="userEmail">Logged in as: <span></span></p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button type="button" class="btn btn-danger" id="logoutBtn">Logout</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Config must be loaded before app.js -->
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
